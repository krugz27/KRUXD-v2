<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder thumbnail</title>
  <desc id="desc">Pixel-style placeholder image with decorative frame.</desc>
  <defs>
    <pattern id="pixels" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#cab18a"/>
      <rect width="4" height="4" fill="#d7c39e"/>
      <rect x="4" y="4" width="4" height="4" fill="#b89a71"/>
    </pattern>
    <linearGradient id="gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f3daab"/>
      <stop offset="1" stop-color="#b98343"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#pixels)"/>
  <rect x="14" y="14" width="612" height="332" fill="none" stroke="#3e2e25" stroke-width="10"/>
  <rect x="30" y="30" width="580" height="300" fill="none" stroke="#e5c98c" stroke-width="4"/>

  <rect x="180" y="132" width="280" height="96" fill="#2d314e" stroke="#24180f" stroke-width="6"/>
  <rect x="196" y="148" width="248" height="64" fill="#1d2242" stroke="url(#gold)" stroke-width="3"/>

  <text x="320" y="174" text-anchor="middle" fill="#f9e6be" font-size="28" font-family="monospace">PIXEL ART</text>
  <text x="320" y="202" text-anchor="middle" fill="#f0d099" font-size="24" font-family="monospace">THUMBNAIL</text>
</svg>
